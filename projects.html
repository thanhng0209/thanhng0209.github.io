<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects • My Portfolio</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background: var(--gradient-bg);">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">Your Name</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                        <li class="nav-item"><button id="darkModeToggle" class="btn btn-link nav-link">🌙</button></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <section id="projects" class="pt-5 mt-5" data-anim>
        <div class="container">
            <h2>Projects</h2>
            <div class="row gy-4">
                <div class="col-md-6 fade-in">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h3 class="card-title">Project One</h3>
                            <p class="card-text">Description of project one, what technologies were used, and what you built.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 fade-in">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h3 class="card-title">Project Two</h3>
                            <p class="card-text">Description of project two. Include links or images if available.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <footer>
        <p>&copy; 2026 Your Name. All rights reserved.</p>
    </footer>
    <script>
        const btn = document.getElementById('darkModeToggle');
        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
        });
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('fade-in');
                    observer.unobserve(e.target);
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('[data-anim], .fade-in').forEach(el => observer.observe(el));
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
