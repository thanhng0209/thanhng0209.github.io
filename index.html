<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark fixed-top"
      style="background: var(--gradient-bg)"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Home</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="templates/about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="templates/projects.html">Projects</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="templates/contact.html">Contact</a>
            </li>
            <li class="nav-item">
              <button id="darkModeToggle" class="btn btn-link nav-link">
                🌙
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <section id="home" class="pt-5 mt-5 fade-in" data-anim>
      <div class="container">
        <h1>Welcome</h1>
        <p>
          Hi—I&rsquo;m a web developer and designer. Browse the sections to
          learn more or see what I&rsquo;ve built.
        </p>
      </div>
    </section>
    <footer>
      <p>&copy; 2026 Your Name. All rights reserved.</p>
    </footer>
    <script>
      // dark mode retained
      const btn = document.getElementById("darkModeToggle");
      btn.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        btn.textContent = document.body.classList.contains("dark")
          ? "☀️"
          : "🌙";
      });
      // intersection observer for fade-in
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add("fade-in");
              observer.unobserve(e.target);
            }
          });
        },
        { threshold: 0.1 },
      );
      document
        .querySelectorAll("[data-anim], .fade-in")
        .forEach((el) => observer.observe(el));
    </script>
    <!-- Bootstrap JS bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ho+j7jyWK8fNQe+A12hV0n6D+HbzMCe3z+v6B2y5YTrEJ4Delmjf4lkfivB0BI0T"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
